name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      # The app-hosted AmanuensisTests target needs a real audio device, the TCC
      # private SPI, and a running NSApp — none of which exist on a headless
      # runner. CI verifies the deterministic SPM core here and that the app
      # compiles below; it does NOT exercise app behavior.
      - name: Unit tests (AudioPipeline core)
        run: swift test --package-path Packages/AudioPipeline

      - name: Build app (Release, ad-hoc)
        run: |
          xcodebuild build \
            -project Amanuensis.xcodeproj -scheme Amanuensis \
            -configuration Release -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO
